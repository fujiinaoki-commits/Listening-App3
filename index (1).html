<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超傾聴ワーク</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif; background:#0a0a0a; color:#e8e8e8; min-height:100vh; }
header { background:#111; border-bottom:1px solid #1e1e1e; position:sticky; top:0; z-index:100; display:flex; align-items:center; gap:12px; padding:0 16px; height:56px; }
.logo-mark { width:36px; height:36px; background:#E8553E; color:#fff; font-weight:900; font-size:17px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.logo-title { font-size:15px; font-weight:800; }
.logo-sub { font-size:8px; color:#444; letter-spacing:0.15em; }
#open-btn { margin-left:auto; background:#E8553E; border:none; border-radius:8px; padding:6px 14px; font-size:12px; font-weight:700; cursor:pointer; color:#fff; white-space:nowrap; }
main { max-width:860px; margin:0 auto; padding:20px 16px 80px; }

/* フレーズカード */
#phrase-card { background:#111; border:1px solid #2a2a2a; border-radius:14px; padding:20px; margin-bottom:14px; }
#phrase-meta { display:flex; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
#level-tag { font-size:10px; font-weight:800; padding:3px 10px; border-radius:20px; letter-spacing:0.05em; }
#lesson-info { font-size:11px; color:#555; }
#sentence-counter { font-size:12px; color:#888; margin-left:auto; }

/* 全文表示エリア */
#full-text-area { background:#0d0d0d; border:1px solid #1e1e1e; border-radius:10px; padding:14px; margin-bottom:14px; display:none; }
#full-text-area .full-text-label { font-size:10px; font-weight:700; color:#555; letter-spacing:0.1em; margin-bottom:10px; }
#full-text-sentences { }
.full-text-sent { font-size:13px; color:#666; line-height:1.8; padding:4px 0; cursor:pointer; border-radius:4px; padding-left:6px; transition:all 0.15s; }
.full-text-sent.current { color:#f0f0f0; font-weight:700; border-left:3px solid #E8553E; padding-left:8px; }
.full-text-sent.done { color:#4CAF82; }

#phrase-text { font-size:clamp(15px,2.5vw,21px); font-weight:700; line-height:1.8; color:#f0f0f0; margin-bottom:16px; transition:filter 0.4s ease; }

/* 再生コントロール */
.tts-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.rate-row { display:flex; gap:4px; }
.rate-btn { border:none; border-radius:6px; padding:6px 11px; font-size:12px; cursor:pointer; color:#fff; background:#1e1e1e; font-family:inherit; font-weight:400; }
.rate-btn.active { font-weight:800; }
.voice-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.voice-btn { border:none; border-radius:8px; padding:6px 12px; font-size:12px; cursor:pointer; color:#fff; background:#1e1e1e; font-family:inherit; font-weight:400; transition:all 0.15s; white-space:nowrap; }
.voice-btn.active { font-weight:800; }
#voice-status { font-size:11px; color:#555; margin-top:4px; }
#play-btn { border:none; border-radius:8px; padding:10px 20px; font-size:14px; font-weight:700; cursor:pointer; color:#fff; font-family:inherit; }
#play-full-btn { border:none; border-radius:8px; padding:10px 16px; font-size:13px; font-weight:700; cursor:pointer; color:#fff; font-family:inherit; background:#555; }
#stop-btn { background:#1e1e1e; border:1px solid #2a2a2a; border-radius:8px; padding:10px 14px; font-size:14px; cursor:pointer; color:#666; font-family:inherit; }
#tts-status { font-size:12px; color:#4CAF82; margin-top:8px; min-height:18px; }

/* ナビ */
#top-bar { display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
#back-btn { background:none; border:1px solid #2a2a2a; border-radius:8px; padding:6px 14px; font-size:12px; cursor:pointer; color:#666; font-family:inherit; white-space:nowrap; }
.sent-nav { display:flex; align-items:center; gap:6px; }
.nav-btn { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:6px; width:30px; height:30px; cursor:pointer; color:#888; font-size:18px; display:flex; align-items:center; justify-content:center; font-family:inherit; }
.nav-btn:disabled { opacity:0.3; cursor:default; }
#sent-count { font-size:12px; color:#555; min-width:50px; text-align:center; }
.prog-wrap { display:flex; align-items:center; gap:8px; flex:1; min-width:80px; }
.prog-bar { flex:1; height:5px; background:#1e1e1e; border-radius:3px; overflow:hidden; }
.prog-fill { height:100%; border-radius:3px; transition:width 0.4s; }
.prog-txt { font-size:11px; font-weight:700; color:#444; min-width:28px; }

/* ステップ */
#step-tabs { display:flex; gap:3px; margin-bottom:0; flex-wrap:wrap; }
.step-tab { border:none; border-radius:8px 8px 0 0; padding:8px 13px; font-size:12px; cursor:pointer; font-family:inherit; background:#111; color:#444; border-bottom:2px solid transparent; transition:all 0.15s; }
#step-card { background:#111; border:1px solid #1e1e1e; border-radius:0 14px 14px 14px; padding:20px; margin-bottom:16px; border-top:3px solid #E8553E; }
.step-head { display:flex; align-items:flex-start; gap:12px; margin-bottom:14px; }
.step-badge { font-size:9px; font-weight:800; color:#fff; padding:4px 10px; border-radius:20px; letter-spacing:0.12em; white-space:nowrap; margin-top:3px; }
.step-title { font-size:17px; font-weight:800; line-height:1.3; }
.step-sub { font-size:12px; color:#666; margin-top:2px; }
.hints { margin-bottom:16px; }
.hint-row { display:flex; align-items:flex-start; gap:8px; padding:5px 0; border-bottom:1px solid #161616; }
.hint-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; margin-top:7px; }
.hint-txt { font-size:13px; color:#bbb; line-height:1.6; }

.field-label { font-size:11px; font-weight:700; color:#555; letter-spacing:0.08em; margin-bottom:8px; }
textarea { width:100%; padding:11px 13px; background:#0d0d0d; border:1px solid #2a2a2a; border-radius:10px; font-size:14px; line-height:1.8; color:#e8e8e8; font-family:inherit; resize:vertical; outline:none; min-height:100px; }
.info-box { border:1px solid; border-radius:10px; padding:10px 14px; font-size:13px; font-weight:600; margin-top:10px; }
.sound-box { background:#0d0d0d; border:1px solid #1e1e1e; border-radius:10px; padding:14px; margin-bottom:12px; }
.sound-note { font-size:14px; color:#ccc; line-height:1.8; }
.rate-guide-row { display:flex; align-items:center; gap:10px; padding:5px 0; border-bottom:1px solid #161616; font-size:13px; color:#888; }
.rate-tag { font-size:10px; font-weight:800; color:#fff; padding:2px 8px; border-radius:5px; white-space:nowrap; }
.toggle-btn { border:none; border-radius:10px; padding:10px 18px; font-size:13px; font-weight:700; cursor:pointer; color:#fff; font-family:inherit; margin-bottom:12px; }
.script-box { background:#0d0d0d; border:1px solid #2a2a2a; border-radius:12px; padding:16px; margin-bottom:12px; }
.script-txt { font-size:15px; line-height:2; color:#ddd; }
.rules-box { background:#0d0d0d; border:1px solid #1e1e1e; border-radius:12px; padding:14px; font-size:13px; }
.rule-row { color:#888; padding:5px 0; border-bottom:1px solid #161616; line-height:1.6; }
.slash-rules { font-size:12px; color:#777; background:#0d0d0d; border:1px solid #1e1e1e; border-radius:10px; padding:10px 14px; margin-bottom:12px; line-height:1.8; }
.slash-chunk { background:#0d0d0d; border-left:4px solid #333; border-radius:0 10px 10px 0; padding:11px 14px; margin-bottom:6px; transition:all 0.2s; }
.slash-chunk.active { opacity:1; }
.slash-chunk.done { opacity:0.45; }
.slash-en { font-size:16px; font-weight:700; color:#f0f0f0; }
.slash-ja { font-size:12px; color:#4CAF82; margin-top:4px; }
.slash-play-btn { border:none; border-radius:6px; padding:5px 12px; font-size:12px; cursor:pointer; color:#fff; white-space:nowrap; font-family:inherit; }
.speed-guide { background:#0d0d0d; border:1px solid #1e1e1e; border-radius:12px; padding:14px; margin-bottom:12px; }
.speed-row { display:flex; align-items:center; gap:10px; padding:6px 0; border-bottom:1px solid #161616; }
.speed-row-txt { font-size:13px; color:#888; }
#done-btn { width:100%; border:none; border-radius:12px; padding:14px; font-size:14px; font-weight:800; cursor:pointer; color:#fff; font-family:inherit; margin-top:14px; letter-spacing:0.04em; }

/* 全文仕上げ */
#full-review { background:#111; border:1px solid #2a2a2a; border-radius:18px; padding:28px 24px; margin-bottom:16px; display:none; }
.full-review-title { font-size:18px; font-weight:900; margin-bottom:16px; }
.full-review-sent { font-size:14px; line-height:2; color:#ccc; padding:8px 12px; border-left:3px solid #2a2a2a; margin-bottom:8px; border-radius:0 8px 8px 0; cursor:pointer; transition:all 0.15s; }
.full-review-sent:hover { border-left-color:#888; color:#f0f0f0; }

#all-done { background:#111; border:1px solid #2a2a2a; border-radius:18px; padding:36px 24px; text-align:center; margin-top:4px; display:none; }
.all-done-title { font-size:20px; font-weight:900; margin-bottom:8px; }
.all-done-p { font-size:13px; color:#666; line-height:1.9; margin:0 0 18px; }
#next-sent-btn { border:none; border-radius:10px; padding:12px 24px; font-size:14px; font-weight:800; cursor:pointer; color:#fff; font-family:inherit; }

/* ホーム */
.hero { padding:36px 0 28px; }
.hero-tag { display:inline-block; background:#E8553E; color:#fff; font-size:11px; font-weight:700; padding:4px 12px; border-radius:20px; letter-spacing:0.1em; margin-bottom:14px; }
.hero-h1 { font-size:clamp(24px,5vw,44px); font-weight:900; line-height:1.25; letter-spacing:-0.02em; margin:0 0 12px; }
.hero-accent { color:#E8553E; }
.hero-p { font-size:14px; color:#666; line-height:1.9; margin:0 0 14px; }
.hero-goal { font-size:13px; color:#4CAF82; background:rgba(76,175,130,0.07); border:1px solid rgba(76,175,130,0.2); border-radius:10px; padding:10px 16px; display:inline-block; }
.level-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:12px; margin:28px 0 36px; }
.level-card { background:#111; border:1px solid #222; border-radius:14px; padding:18px; text-align:left; cursor:pointer; transition:border-color 0.2s; width:100%; font-family:inherit; }
.lv-tag { font-size:10px; font-weight:800; padding:3px 10px; border-radius:20px; display:inline-block; margin-bottom:8px; letter-spacing:0.05em; }
.lv-uni { font-size:17px; font-weight:900; margin-bottom:3px; color:#e8e8e8; }
.lv-label { font-size:11px; color:#555; margin-bottom:8px; }
.lv-desc { font-size:12px; color:#777; line-height:1.7; margin-bottom:8px; }
.lv-target { font-size:11px; font-weight:700; margin-bottom:8px; }
.lv-cta { font-size:12px; font-weight:700; }
.lesson-select-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; margin-top:20px; }
.lesson-card { background:#111; border:1px solid #2a2a2a; border-radius:12px; padding:16px; text-align:left; cursor:pointer; font-family:inherit; }
.lesson-card:hover { border-color:#555; }
.lesson-num { font-size:10px; font-weight:800; color:#555; letter-spacing:0.1em; margin-bottom:6px; }
.lesson-topic { font-size:14px; font-weight:700; color:#e8e8e8; margin-bottom:6px; }
.lesson-preview { font-size:11px; color:#666; line-height:1.6; }
#work-view { display:none; }
#lesson-select-view { display:none; }
</style>
</head>
<body>

<header>
  <div class="logo-mark">超</div>
  <div>
    <div class="logo-title">超傾聴ワーク</div>
    <div class="logo-sub">RIGHT-BRAIN LISTENING</div>
  </div>
  <button id="open-btn" onclick="window.open(location.href,'_blank')">🔗 別タブで開く</button>
</header>

<main>
<!-- ホーム -->
<div id="home-view">
  <div class="hero">
    <div class="hero-tag">西沢ロイ先生メソッド × 右脳リスニング</div>
    <h1 class="hero-h1">左脳を黙らせろ。<br><span class="hero-accent">音だけを信じろ。</span></h1>
    <p class="hero-p">知識・意味・推測に頼る「左脳リスニング」から卒業。<br>1文ずつ5ステップで右脳が英語を処理できる耳をつくる。</p>
    <div class="hero-goal">🎯 目標：共通テストリスニング80%以上 · 全員偏差値60超え</div>
  </div>
  <div class="level-grid" id="level-grid"></div>
</div>

<!-- レッスン選択 -->
<div id="lesson-select-view">
  <div id="top-bar" style="margin-bottom:20px">
    <button id="back-btn" onclick="showHome()">← レベル選択</button>
    <div style="font-size:16px;font-weight:800" id="lesson-select-title"></div>
  </div>
  <div class="lesson-select-grid" id="lesson-select-grid"></div>
</div>

<!-- ワーク -->
<div id="work-view">
  <div id="top-bar">
    <button id="back-btn2" onclick="showLessonSelect()">← レッスン選択</button>
    <div class="sent-nav">
      <button class="nav-btn" id="prev-btn" onclick="goPrev()">‹</button>
      <span id="sent-count">文1 / 10</span>
      <button class="nav-btn" id="next-btn" onclick="goNext()">›</button>
    </div>
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <span class="prog-txt" id="prog-txt">0%</span>
    </div>
  </div>

  <div id="phrase-card">
    <div id="phrase-meta">
      <span id="level-tag"></span>
      <span id="lesson-info"></span>
      <span id="sentence-counter"></span>
    </div>
    <div id="phrase-text"></div>
    <div class="voice-row" id="voice-row">
      <span style="font-size:11px;color:#555;white-space:nowrap">🎙 音声：</span>
    </div>
    <div id="voice-status"></div>
    <div class="tts-row">
      <div class="rate-row">
        <button class="rate-btn" data-rate="0.5"  onclick="setRate(0.5)">0.5x</button>
        <button class="rate-btn" data-rate="0.75" onclick="setRate(0.75)">0.75x</button>
        <button class="rate-btn active" data-rate="1.0" onclick="setRate(1.0)">1.0x</button>
        <button class="rate-btn" data-rate="1.25" onclick="setRate(1.25)">1.25x</button>
      </div>
      <button id="play-btn" onclick="playPhrase()">▶ この文を再生</button>
      <button id="stop-btn" onclick="stopPhrase()">■ 停止</button>
    </div>
    <div id="tts-status"></div>
  </div>

  <div id="step-tabs"></div>
  <div id="step-card">
    <div class="step-head">
      <div class="step-badge" id="step-badge">STEP 1</div>
      <div>
        <div class="step-title" id="step-title"></div>
        <div class="step-sub" id="step-sub"></div>
      </div>
    </div>
    <div class="hints" id="hints"></div>
    <div id="step-content"></div>
    <button id="done-btn" onclick="completeStep()">STEP 1 完了 →</button>
  </div>

  <!-- 全文表示（一番下） -->
  <div id="full-text-area" style="display:none;margin-bottom:16px">
    <div class="full-text-label">📰 ニュース全文（クリックでその文に移動）</div>
    <div id="full-text-sentences"></div>
  </div>

  <!-- 全文仕上げ（全文完了後） -->
  <div id="full-review">
    <div class="full-review-title" id="full-review-title">🎉 全文完了！通しで聴こう</div>
    <div id="full-review-list"></div>
    <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">
      <button id="play-full-btn" onclick="playFullText()"
        style="border:none;border-radius:10px;padding:12px 20px;font-size:14px;font-weight:800;cursor:pointer;color:#fff;font-family:inherit">
        ▶ 全文通しで再生
      </button>
      <button onclick="stopPhrase()"
        style="background:#1e1e1e;border:1px solid #2a2a2a;border-radius:10px;padding:12px 16px;font-size:13px;cursor:pointer;color:#666;font-family:inherit">
        ■ 停止
      </button>
    </div>
  </div>

  <div id="all-done">
    <div style="font-size:48px;margin-bottom:10px">🎉</div>
    <div class="all-done-title" id="all-done-title">この文 完了！</div>
    <p class="all-done-p">5ステップ完了。次の文へ進もう！</p>
    <button id="next-sent-btn" onclick="goNext()">次の文へ →</button>
  </div>
</div>
</main>

<script>
// ═══════════════════════════════════════════════════════════
// データ定義
// ═══════════════════════════════════════════════════════════
const LEVELS = [
  { id:"A", name:"LEVEL A", uni:"摂神追桃", tag:"共通テスト基礎", color:"#4CAF82",
    desc:"日常・基礎表現。1文ずつニュースを処理する。", target:"共通テスト 50〜60点台 / 偏差値45〜50" },
  { id:"B", name:"LEVEL B", uni:"産近甲龍", tag:"共通テスト標準", color:"#4A90D9",
    desc:"社会・環境・科学ニュース。語順感覚を養う。", target:"共通テスト 70点台 / 偏差値50〜55" },
  { id:"C", name:"LEVEL C", uni:"関関同立", tag:"共通テスト満点", color:"#E8553E",
    desc:"本格ニュース英語。右脳リスニング完成形。", target:"共通テスト 80点以上 / 偏差値55〜60" },
  { id:"D", name:"LEVEL D", uni:"早慶・難関国立", tag:"早慶＆ネイティブ", color:"#9B59B6",
    desc:"ナチュラルスピードのニュース。左脳を完全に切る。", target:"難関大学合格 / 偏差値65以上" },
];

// ─── レッスンデータ ───────────────────────────────────────
// 構造: { id, topic, sentences: [ { en, slashChunks, soundNote } ] }
const LESSONS = {
  A: [
    {
      id:"A-L01", topic:"学校生活・友人関係",
      sentences: [
        { en:"Yuki is a high school student in Osaka.",
          slashChunks:[{en:"Yuki is",ja:"ユキは〜だ"},{en:"a high school student",ja:"高校生"},{en:"in Osaka.",ja:"大阪の"}],
          soundNote:"high school → 「ハイスクー」のようにlが落ちる。" },
        { en:"She wakes up at six every morning.",
          slashChunks:[{en:"She wakes up",ja:"彼女は起きる"},{en:"at six",ja:"6時に"},{en:"every morning.",ja:"毎朝"}],
          soundNote:"wakes up → 「ウェイクサップ」のように連結。at sixのtが弱い。" },
        { en:"She usually walks to school with her best friend, Hana.",
          slashChunks:[{en:"She usually walks",ja:"彼女はいつも歩いて行く"},{en:"to school",ja:"学校へ"},{en:"with her best friend, Hana.",ja:"親友のハナと一緒に"}],
          soundNote:"usually → 「ユージュリ」のようにalが弱化。with her → 「ウィザ」のようにhが落ちる。" },
        { en:"It takes them about twenty minutes to get there.",
          slashChunks:[{en:"It takes them",ja:"彼女たちにはかかる"},{en:"about twenty minutes",ja:"約20分"},{en:"to get there.",ja:"そこに着くまでに"}],
          soundNote:"takes them → 「テイクスゼム」のように連結。twenty → 「トゥエニ」のようにtが濁る。" },
        { en:"On the way, they often talk about their classes and teachers.",
          slashChunks:[{en:"On the way,",ja:"途中で"},{en:"they often talk",ja:"彼女たちはよく話す"},{en:"about their classes and teachers.",ja:"授業や先生について"}],
          soundNote:"on the way → 「オンダウェイ」のように連結。often → 「オーフン」のようにtが落ちる。" },
        { en:"Hana is very good at English and wants to study abroad someday.",
          slashChunks:[{en:"Hana is very good at English",ja:"ハナは英語がとても得意で"},{en:"and wants to study abroad",ja:"留学したいと思っている"},{en:"someday.",ja:"いつか"}],
          soundNote:"good at → 「グダッ」のようにdとatが連結。wants to → 「ウォンツタ」。" },
        { en:"Yuki, on the other hand, is more interested in music.",
          slashChunks:[{en:"Yuki,",ja:"ユキは"},{en:"on the other hand,",ja:"一方で"},{en:"is more interested in music.",ja:"音楽の方に興味がある"}],
          soundNote:"on the other hand → 「オンジアザハンド」のように全体が連結してリズムよく流れる。" },
        { en:"She plays the guitar and hopes to join a band one day.",
          slashChunks:[{en:"She plays the guitar",ja:"彼女はギターを弾いていて"},{en:"and hopes to join a band",ja:"バンドに入りたいと思っている"},{en:"one day.",ja:"いつか"}],
          soundNote:"plays the → 「プレイズダ」。hopes to → 「ホウプスタ」のようにtが弱化。" },
        { en:"Despite their different interests, the two girls are very close.",
          slashChunks:[{en:"Despite their different interests,",ja:"異なる興味を持ちながらも"},{en:"the two girls",ja:"その2人の女の子は"},{en:"are very close.",ja:"とても仲が良い"}],

// TTS
// ═══════════════════════════════════════════════════════════
function speakText(text, onEnd) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const doSpeak = () => {
    const u = new SpeechSynthesisUtterance(text);
    u.rate   = currentRate;
    u.pitch  = 1.0;
    u.volume = 1.0;
    if (selectedVoice) {
      u.voice = selectedVoice;
      u.lang  = selectedVoice.lang;
    } else {
      u.lang = 'en-US';
      const voices = speechSynthesis.getVoices();
      const v = voices.find(v => v.lang === 'en-US' && v.name.includes('Google'))
             || voices.find(v => v.lang === 'en-US')
             || voices.find(v => v.lang.startsWith('en'));
      if (v) u.voice = v;
    }
    if (onEnd) u.onend = onEnd;
    u.onerror = () => {};
    speechSynthesis.speak(u);
  };
  const voices = speechSynthesis.getVoices();
  if (voices.length > 0) { doSpeak(); }
  else {
    speechSynthesis.onvoiceschanged = () => { speechSynthesis.onvoiceschanged = null; doSpeak(); };
    setTimeout(() => { if (speechSynthesis.getVoices().length === 0) doSpeak(); }, 500);
  }
}

// 音声ボタンを描画
function renderVoiceButtons() {
  const row = document.getElementById('voice-row');
  const status = document.getElementById('voice-status');
  if (!row) return;

  const voices = speechSynthesis.getVoices();
  availableVoices = voices.filter(v => v.lang.startsWith('en'));

  // プロファイルごとにマッチする音声を探す
  const found = [];
  VOICE_PROFILES.forEach(profile => {
    let match = null;
    // langで検索
    for (const lang of profile.langs) {
      match = voices.find(v => v.lang === lang && v.name.includes('Google'))
           || voices.find(v => v.lang === lang);
      if (match) break;
    }
    if (match) found.push({ profile, voice: match });
  });

  // ボタン生成
  // ラベルスパンを残して他を削除
  row.innerHTML = '<span style="font-size:11px;color:#555;white-space:nowrap">🎙 音声：</span>';

  if (found.length === 0) {
    row.innerHTML += '<span style="font-size:11px;color:#555">（音声リスト読み込み中...）</span>';
    status.textContent = '';
    return;
  }

  found.forEach(({ profile, voice }, i) => {
    const btn = document.createElement('button');
    btn.className = 'voice-btn' + (i === 0 && !selectedVoice ? ' active' : '');
    btn.textContent = profile.label;
    btn.dataset.key = profile.key;
    if (i === 0 && !selectedVoice) {
      selectedVoice = voice;
      btn.style.background = document.getElementById('level-tag') ?
        (document.getElementById('level-tag').style.color || '#4CAF82') : '#4CAF82';
    }
    btn.onclick = () => {
      selectedVoice = voice;
      document.querySelectorAll('.voice-btn').forEach(b => {
        b.classList.remove('active');
        b.style.background = '#1e1e1e';
      });
      btn.classList.add('active');
      const lv = LEVELS.find(l => l.id === currentLevelId);
      btn.style.background = lv ? lv.color : '#4CAF82';
      status.textContent = `✅ ${profile.flag} ${voice.name}`;
      setTimeout(() => { status.textContent = ''; }, 2000);
    };
    row.appendChild(btn);
  });

  // 初期色設定
  const lv = LEVELS.find(l => l.id === currentLevelId);
  const activeBtn = row.querySelector('.voice-btn.active');
  if (activeBtn && lv) activeBtn.style.background = lv.color;

  status.textContent = found.length + '種類の音声が利用可能';
  setTimeout(() => { status.textContent = ''; }, 2000);
}

function playPhrase() {
  const lesson  = LESSONS[currentLevelId][currentLessonIdx];
  const sent    = lesson.sentences[currentSentIdx];
  const btn     = document.getElementById('play-btn');
  const status  = document.getElementById('tts-status');
  btn.textContent = '⏸ 再生中...';
  status.style.color = '#4CAF82';
  speakText(sent.en, () => {
    btn.textContent = '▶ この文を再生';
    status.textContent = '✅ 完了';
    setTimeout(() => { status.textContent = ''; }, 1500);
  });
}

function stopPhrase() {
  if (window.speechSynthesis) speechSynthesis.cancel();
  const btn = document.getElementById('play-btn');
  if (btn) btn.textContent = '▶ この文を再生';
  const status = document.getElementById('tts-status');
  if (status) status.textContent = '';
}

function speakChunk(text) {
  speakText(text, null);
}

// 全文通し再生
function playFullText() {
  const lesson = LESSONS[currentLevelId][currentLessonIdx];
  const allText = lesson.sentences.map(s => s.en).join(' ');
  const btn = document.getElementById('play-full-btn');
  if (btn) btn.textContent = '⏸ 再生中...';
  speakText(allText, () => { if (btn) btn.textContent = '▶ 全文通しで再生'; });
}

function setRate(r) {
  currentRate = r;
  const lv = LEVELS.find(l => l.id === currentLevelId);
  document.querySelectorAll('.rate-btn').forEach(b => {
    const isActive = parseFloat(b.dataset.rate) === r;
    b.classList.toggle('active', isActive);
    b.style.background = isActive ? (lv ? lv.color : '#E8553E') : '#1e1e1e';
  });
}

  document.getElementById('home-view').style.display = 'none';
  document.getElementById('lesson-select-view').style.display = 'block';

  const grid = document.getElementById('lesson-select-grid');
  grid.innerHTML = '';
  const lessons = LESSONS[levelId] || [];
  lessons.forEach((lesson, idx) => {
    const card = document.createElement('button');
    card.className = 'lesson-card';
    card.innerHTML = `
      <div class="lesson-num" style="color:${lv.color}">LESSON ${idx + 1}</div>
      <div class="lesson-topic">${lesson.topic}</div>
      <div class="lesson-preview">${lesson.sentences[0].en.substring(0, 50)}...</div>

    grid.innerHTML = '<div style="color:#555;font-size:14px;padding:20px">このレベルのレッスンは準備中です。</div>';
  }
}

function showLessonSelect() {
  stopPhrase();
  showLevelLessons(currentLevelId);
}

function startLesson(levelId, lessonIdx) {
  currentLevelId   = levelId;
  currentLessonIdx = lessonIdx;
  currentSentIdx   = 0;
  completedSents   = [];
  resetWork();
  document.getElementById('lesson-select-view').style.display = 'none';
  document.getElementById('work-view').style.display = 'block';
  renderWork();
}

function resetWork() {
  currentStepIdx = 0;
  completedSteps = [];
  dictText       = "";
  showScript     = false;
  slashStarted   = false;
  slashIdx       = 0;
}

// ═══════════════════════════════════════════════════════════
// ワーク描画
// ═══════════════════════════════════════════════════════════
function renderWork() {
  const lv     = LEVELS.find(l => l.id === currentLevelId);
  const lesson = LESSONS[currentLevelId][currentLessonIdx];
  const sent   = lesson.sentences[currentSentIdx];
  const step   = STEPS[currentStepIdx];
  const total  = lesson.sentences.length;

  // レベルタグ・レッスン情報
  document.getElementById('level-tag').textContent = `${lv.name}`;
  document.getElementById('level-tag').style.background = lv.color + '22';
  document.getElementById('level-tag').style.color = lv.color;
  document.getElementById('lesson-info').textContent = `${lesson.topic}`;
  document.getElementById('sentence-counter').textContent = `文${currentSentIdx + 1} / ${total}`;

  // 英文（STEP1・2はぼかし）
  const phraseEl = document.getElementById('phrase-text');
  phraseEl.textContent = sent.en;
  phraseEl.style.filter = currentStepIdx <= 1 ? 'blur(7px)' : 'none';
  phraseEl.style.userSelect = currentStepIdx <= 1 ? 'none' : '';

  // 再生ボタン
  document.getElementById('play-btn').style.background = lv.color;
  document.getElementById('play-btn').textContent = '▶ この文を再生';
  document.getElementById('tts-status').textContent = '';

  // ナビ
  document.getElementById('sent-count').textContent = `文${currentSentIdx + 1} / ${total}`;
  document.getElementById('prev-btn').disabled = currentSentIdx === 0;
  document.getElementById('next-btn').disabled = currentSentIdx === total - 1;

  // 進捗（文単位）
  const pct = Math.round((completedSents.length / total) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-fill').style.background = lv.color;
  document.getElementById('prog-txt').textContent = pct + '%';

  // 全文サイドバー
  renderFullText(lesson, lv);

  // ステップタブ
  const tabs = document.getElementById('step-tabs');
  tabs.innerHTML = '';
  STEPS.forEach((st, i) => {
    const btn = document.createElement('button');
    btn.className = 'step-tab';
    btn.textContent = (completedSteps.includes(i) ? '✓' : st.icon) + ' ' + st.id;
    const isActive = i === currentStepIdx;
    const isDone   = completedSteps.includes(i);
    btn.style.background   = isActive ? st.color + '22' : '#111';
    btn.style.color        = isActive ? st.color : isDone ? '#555' : '#444';
    btn.style.borderBottom = isActive ? `2px solid ${st.color}` : '2px solid transparent';
    btn.style.opacity      = (!isDone && i > currentStepIdx) ? '0.35' : '1';
    btn.onclick = () => { currentStepIdx = i; renderWork(); };
    tabs.appendChild(btn);
  });

  // ステップカード
  const allDone = completedSteps.length === STEPS.length;
  document.getElementById('step-card').style.display = allDone ? 'none' : 'block';
  document.getElementById('all-done').style.display  = allDone ? 'block' : 'none';

  if (!allDone) {
    document.getElementById('step-card').style.borderTopColor = step.color;
    document.getElementById('step-badge').textContent = `STEP ${step.id}`;
    document.getElementById('step-badge').style.background = step.color;
    document.getElementById('step-title').textContent = step.title;
    document.getElementById('step-sub').textContent   = step.sub;

    const hints = document.getElementById('hints');
    hints.innerHTML = '';
    step.hint.forEach(h => {
      const row = document.createElement('div');
      row.className = 'hint-row';
      row.innerHTML = `<span class="hint-dot" style="background:${step.color}"></span><span class="hint-txt">${h}</span>`;
      hints.appendChild(row);
    });

    renderStepContent(sent, step, lv);

    const doneBtn = document.getElementById('done-btn');
    doneBtn.style.background = completedSteps.includes(currentStepIdx) ? '#1e1e1e' : step.color;
    doneBtn.textContent = completedSteps.includes(currentStepIdx)
      ? `✓ STEP ${step.id} 完了済み`
      : `STEP ${step.id} 完了 →`;
  } else {
    // 文完了
    document.getElementById('all-done-title').textContent = `文${currentSentIdx + 1} 完了！`;
    document.getElementById('all-done-title').style.color = lv.color;
    document.getElementById('next-sent-btn').style.background = lv.color;
    document.getElementById('next-sent-btn').style.display =
      currentSentIdx < total - 1 ? 'inline-block' : 'none';

    if (!completedSents.includes(currentSentIdx)) completedSents.push(currentSentIdx);

    // 全レッスン完了チェック
    if (completedSents.length === total) {
      renderFullReview(lesson, lv);
    }
  }

  setRate(currentRate);
  // 音声ボタン更新
  setTimeout(renderVoiceButtons, 100);
}

function renderFullText(lesson, lv) {
  const area = document.getElementById('full-text-area');
  const container = document.getElementById('full-text-sentences');
  area.style.display = 'block';
  area.style.background = '#111';
  area.style.border = '1px solid #1e1e1e';
  area.style.borderRadius = '14px';
  area.style.padding = '16px';
  container.innerHTML = '';
  lesson.sentences.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'full-text-sent';
    if (i === currentSentIdx) div.classList.add('current');
    else if (completedSents.includes(i)) div.classList.add('done');
    div.textContent = `${i + 1}. ${s.en}`;
    div.onclick = () => {
      currentSentIdx = i;
      resetWork();
      renderWork();
    };
    container.appendChild(div);
  });
}

        <div class="script-txt">${sent.en}</div>
      </div>
      <div class="rules-box">
        <div style="color:#E8553E;font-weight:700;margin-bottom:8px">❌ やってはいけないこと</div>
        <div class="rule-row">帰り読み（後ろから前に訳す）→ リスニング力は絶対につかない</div>
        <div class="rule-row">日本語訳に依存する → 英語を英語のまま処理する練習をする</div>
        <div style="color:#4CAF82;font-weight:700;margin:12px 0 8px">✅ やること</div>
        <div class="rule-row">英語の語順のまま → 絵・映像のイメージでつかむ</div>
        <div class="rule-row">知らない単語はここで調べてOK</div>
      </div>`;
  }

  if (currentStepIdx === 3) {
    let html = `<div class="slash-rules">
      <span style="color:#E8553E;font-weight:800">ルール①</span> スラッシュより前に絶対戻らない　
      <span style="color:#E8553E;font-weight:800">ルール②</span> スラッシュを超えて訳さない
    </div>`;
    if (!slashStarted) {
      html += `<button class="toggle-btn" style="background:${step.color}" onclick="startSlash()">⚡ スラッシュリーディング開始</button>`;
    } else {
      sent.slashChunks.slice(0, slashIdx + 1).forEach((chunk, i) => {
        const isActive = i === slashIdx;
        const escapedEn = chunk.en.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        html += `<div class="slash-chunk ${isActive ? 'active' : 'done'}"
          style="border-left-color:${isActive ? step.color : '#2a2a2a'}">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <div class="slash-en" style="flex:1">${chunk.en}</div>
            <button class="slash-play-btn"
              style="background:${isActive ? step.color : '#2a2a2a'}"
              onclick="speakChunk('${escapedEn}')">🔊 聴く</button>
          </div>
          ${isActive && chunk.ja ? `<div class="slash-ja">${chunk.ja}</div>` : ''}
        </div>`;
      });
      if (slashIdx < sent.slashChunks.length - 1) {
        html += `<button class="toggle-btn" style="background:${step.color};margin-top:10px" onclick="nextSlash()">次の塊へ →</button>`;
      } else {
        html += `<div class="info-box" style="border-color:#4CAF8244;color:#4CAF82">✅ 全塊を語順通りに処理しました！</div>`;
      }
    }
    // 日本語訳全文を追加
    html += `<div style="background:#0a1a0a;border:1px solid #1e3a1e;border-radius:12px;padding:16px;margin-top:16px">
      <div style="font-size:10px;font-weight:700;color:#4CAF82;letter-spacing:0.1em;margin-bottom:12px">📝 日本語訳（全文）</div>`;
    sent.slashChunks.forEach((chunk, i) => {
      if (chunk.ja) {
        html += `<div style="font-size:13px;color:#8db;line-height:1.9;padding:3px 0;border-bottom:1px solid #1a2e1a">
          <span style="color:#4a7a4a;font-size:11px;margin-right:6px">${i+1}</span>${chunk.ja}
        </div>`;
      }
    });
    html += `</div>`;
    c.innerHTML = html;
  }

  if (currentStepIdx === 4) {
    c.innerHTML = `
      <div class="speed-guide">
        <div class="speed-row"><span class="rate-tag" style="background:#444">0.5x</span><span class="speed-row-txt">音変化を最終確認</span></div>
        <div class="speed-row"><span class="rate-tag" style="background:#4A90D9">0.75x</span><span class="speed-row-txt">語順通りイメージを維持</span></div>
        <div class="speed-row"><span class="rate-tag" style="background:#4CAF82">1.0x</span><span class="speed-row-txt">ナチュラルスピードで理解</span></div>
        <div class="speed-row"><span class="rate-tag" style="background:#9B59B6">1.25x</span><span class="speed-row-txt">早慶・ネイティブレベルへ</span></div>
      </div>
      <div class="info-box" style="border-color:#9B59B644;color:#9B59B6">
        🎯 スクリプトなし・1.0xで意味が映像でつかめたら完成！
      </div>`;
  }
}

function renderFullReview(lesson, lv) {
  const area = document.getElementById('full-review');
  area.style.display = 'block';
  document.getElementById('full-review-title').textContent = '🎉 全文完了！通しで聴こう';
  document.getElementById('full-review-title').style.color = lv.color;
  document.getElementById('play-full-btn').style.background = lv.color;

  const list = document.getElementById('full-review-list');
  list.innerHTML = '';
  lesson.sentences.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'full-review-sent';
    div.innerHTML = `<span style="color:#555;font-size:11px;margin-right:8px">${i+1}</span>${s.en}`;
    div.onclick = () => speakChunk(s.en);
    list.appendChild(div);
  });
}

function toggleScript(color) {
  showScript = !showScript;
  const box = document.getElementById('script-box');
  const btn = document.getElementById('script-toggle-btn');
  if (box) box.style.display = showScript ? 'block' : 'none';
  if (btn) {
    btn.style.background = showScript ? color : '#222';
    btn.textContent = showScript ? '📖 英文を閉じる' : '📖 英文を表示する';
  }
}

function startSlash() {
  slashStarted = true; slashIdx = 0;
  const lesson = LESSONS[currentLevelId][currentLessonIdx];
  renderStepContent(lesson.sentences[currentSentIdx], STEPS[currentStepIdx], LEVELS.find(l=>l.id===currentLevelId));
}

function nextSlash() {
  slashIdx++;
  const lesson = LESSONS[currentLevelId][currentLessonIdx];
  renderStepContent(lesson.sentences[currentSentIdx], STEPS[currentStepIdx], LEVELS.find(l=>l.id===currentLevelId));
}

function completeStep() {
  if (!completedSteps.includes(currentStepIdx)) completedSteps.push(currentStepIdx);
  if (currentStepIdx < STEPS.length - 1) currentStepIdx++;
  renderWork();
}

function goNext() {
  const lesson = LESSONS[currentLevelId][currentLessonIdx];
  if (currentSentIdx < lesson.sentences.length - 1) {
    currentSentIdx++;
    resetWork();
    renderWork();
  }
}

function goPrev() {
  if (currentSentIdx > 0) {
    currentSentIdx--;
    resetWork();
    renderWork();
  }
}

// ═══════════════════════════════════════════════════════════
// ホーム
// ═══════════════════════════════════════════════════════════
function renderHome() {
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';
  LEVELS.forEach(lv => {
    const lessonCount = (LESSONS[lv.id] || []).length;
    const btn = document.createElement('button');
    btn.className = 'level-card';
    btn.style.borderColor = lv.color + '44';
    btn.innerHTML = `
      <div class="lv-tag" style="background:${lv.color}22;color:${lv.color}">${lv.name}</div>
      <div class="lv-uni">${lv.uni}</div>
      <div class="lv-label">${lv.tag}</div>
      <div class="lv-desc">${lv.desc}</div>
      <div class="lv-target" style="color:${lv.color}">${lv.target}</div>
      <div class="lv-cta" style="color:${lv.color}">${lessonCount}レッスン（各10文）→</div>`;
    btn.onclick = () => showLevelLessons(lv.id);
    grid.appendChild(btn);
  });
}

renderHome();
if (window.speechSynthesis) {
  speechSynthesis.onvoiceschanged = () => {
    speechSynthesis.getVoices();
    renderVoiceButtons();
  };
  speechSynthesis.getVoices();
}
</script>
